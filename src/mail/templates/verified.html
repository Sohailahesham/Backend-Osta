<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>تأكيد البريد الإلكتروني</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        background: #F1F7E7;
        font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
        direction: rtl;
      }
      .wrap {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .card {
        max-width: 420px;
        width: 100%;
        background: #ffffff;
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 10px 30px rgba(28, 75, 65, 0.12);
        text-align: center;
      }
      .strip {
        height: 6px;
        background: linear-gradient(to right, #1C4B41 0%, #457546 14%, #6FA143 29%, #85B83D 36%, #9CCF32 43%, #B3E718 50%, #B3E718 100%);
      }
      .strip.error {
        background: linear-gradient(to bottom, #7F1D1D 0%, #B91C1C 100%);
      }
      .icon-circle {
        width: 84px;
        height: 84px;
        margin: 30px auto 0;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .icon-circle.success {
        background: #F1F7E7;
        color: #1C4B41;
      }
      .icon-circle.error {
        background: #FCE8E8;
        color: #B91C1C;
      }
      h2 {
        margin: 22px 24px 8px;
        font-size: 21px;
      }
      h2.success { color: #1C4B41; }
      h2.error { color: #B91C1C; }
      p.sub {
        margin: 0 24px 35px;
        color: #636261;
        font-size: 14px;
        line-height: 1.7;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <div class="strip {{CLASS}}"></div>
        <div class="icon-circle {{CLASS}}">{{ICON}}</div>
        <h2 class="{{CLASS}}">{{MESSAGE}}</h2>
        <p class="sub">{{SUB_MESSAGE}}</p>
      </div>
    </div>
  </body>
</html>
