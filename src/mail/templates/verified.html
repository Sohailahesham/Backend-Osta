<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>تأكيد حساب أوسطا</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', sans-serif;
      }
      body {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: radial-gradient(circle at top right, #4caf5020, #f4f8f4);
        padding: 20px;
      }
      .card {
        width: 100%;
        max-width: 500px;
        background: white;
        border-radius: 24px;
        padding: 45px 35px;
        text-align: center;
        box-shadow: 0 10px 40px rgba(27, 94, 32, 0.12);
        border-top: 6px solid #1b5e20;
      }
      .logo {
        font-size: 32px;
        font-weight: 800;
        color: #1b5e20;
        margin-bottom: 30px;
        letter-spacing: 1px;
      }
      .icon-box {
        width: 110px;
        height: 110px;
        margin: auto;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 55px;
        margin-bottom: 25px;
      }
      .success-bg {
        background: #e8f5e9;
      }
      .error-bg {
        background: #fdecec;
      }
      .success {
        color: #1b5e20;
      }
      .error {
        color: #c62828;
      }
      .icon-box svg {
        width: 70px;
        height: 70px;
      }
      h1 {
        font-size: 30px;
        margin-bottom: 15px;
      }
      p {
        color: #666;
        line-height: 1.8;
        font-size: 16px;
      }
      .line {
        width: 70px;
        height: 4px;
        background: #1b5e20;
        margin: 20px auto;
        border-radius: 10px;
      }
      .footer {
        margin-top: 25px;
        font-size: 13px;
        color: #999;
      }
    </style>
  </head>
  <body>
    <div class="card">
<img
  src="/assets/logo.png"
  alt="أوسطا"
  style="max-width:180px;height:auto;margin-bottom:30px;"
/>
    <div class="icon-box {{CLASS}}-bg">
        <span class="{{CLASS}}"> {{ICON}} </span>
      </div>
      <h1 class="{{CLASS}}">{{MESSAGE}}</h1>
      <div class="line"></div>
      <p>{{SUB_MESSAGE}}</p>
      <div class="footer">منصة أسطي © 2026</div>
    </div>
  </body>
</html>
