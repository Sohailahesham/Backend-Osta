<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>رمز التحقق - أوسطا</title>
  </head>
  <body>
    <div
      style="
        margin: 0;
        padding: 40px 20px;
        background: #f4f8f4;
        font-family:
          Segoe UI,
          Arial,
          sans-serif;
        direction: rtl;
        text-align: right;
      "
    >
      <div
        style="
          max-width: 600px;
          margin: auto;
          background: #ffffff;
          border-radius: 20px;
          overflow: hidden;
          box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        "
      >
        <!-- Header -->
        <div style="background: #1b5e20; padding: 30px; text-align: center">
<img
  src="cid:osta-logo"
  alt="أوسطا"
 style="max-width:180px;height:auto;margin-bottom:30px;"
/>          <p style="color: #d8ead9; margin-top: 10px; font-size: 15px">
            منصة الخدمات الاحترافية
          </p>
        </div>

        <!-- Content -->
        <div style="padding: 40px 30px; text-align: center">
          <div
            style="
              width: 90px;
              height: 90px;
              margin: auto;
              border-radius: 50%;
              background: #e8f5e9;
              line-height: 90px;
              font-size: 42px;
            "
          >
            ✉️
          </div>

          <h2 style="color: #1b5e20; margin-top: 25px">رمز التحقق</h2>

          <div
            style="
              font-size: 42px;
              font-weight: bold;
              letter-spacing: 10px;
              color: #1b5e20;
              background: #e8f5e9;
              padding: 18px 30px;
              border-radius: 12px;
              margin: 25px 0;
              display: inline-block;
            "
          >
            {{OTP}}
          </div>

          <p style="margin-top: 25px; color: #888; font-size: 14px">
            هذا الرمز صالح لمدة <strong>10 دقائق</strong>
          </p>
        </div>

        <!-- Footer -->
        <div
          style="
            background: #fafafa;
            padding: 20px;
            text-align: center;
            border-top: 1px solid #eee;
          "
        >
          <p style="color: #888; font-size: 13px; margin: 0">
            منصة أسطي © 2026
          </p>
          <p style="color: #aaa; font-size: 12px; margin-top: 8px">
            إذا لم تطلب هذا الرمز يمكنك تجاهل الرسالة بأمان.
          </p>
        </div>
      </div>
    </div>
  </body>
</html>
